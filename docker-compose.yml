services:
  # Database
  mongodb:
    image: mongo:6.0
    container_name: cinema_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cinema_network

  # Distributed Lock (Timeout)
  redis:
    image: redis:7.0-alpine
    container_name: cinema_redis
    ports:
      - "6379:6379"
    command: redis-server --notify-keyspace-events Ex
    volumes:
      - redis_data:/data
    networks:
      - cinema_network

  #Message Queue for Async Logging and Notification
  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: cinema_rabbitmq
    ports:
      - "5672:5672"      # backend connection
      - "15672:15672"    # Web UI (User/Pass: guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cinema_network

  # API Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinema_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - cinema_network

  # Web UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinema_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cinema_network

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:

networks:
  cinema_network:
    driver: bridge
